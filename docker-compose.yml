services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.local
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Background worker: consumes the BullMQ queue (doc-process, agent-run,
  # index-cleanup). Runs the same image as the app but overrides the command
  # to start the worker entrypoint instead of `next start`. Shares REDIS_URL
  # so the app (producer) and worker (consumer) talk to the same queue.
  worker:
    build: .
    command: ["node", "worker.js"]
    env_file: .env.local
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
